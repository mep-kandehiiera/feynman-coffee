<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

section{
padding:40px;
max-width:1000px;
margin:auto;
}

button{
background:#6f4e37;
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

.totals{
text-align:right;
font-weight:bold;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<section>

<h2>Account</h2>

<label>Email (Gmail only)</label>
<input type="email" id="email">

<label>Password</label>
<input type="password" id="password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<hr>

<h2>Your Cart</h2>
<div id="cartContainer"></div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendEmailVerification,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function(){

const email=document.getElementById("email").value.trim().toLowerCase();
const password=document.getElementById("password").value;

const gmailPattern=/^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if(!gmailPattern.test(email)){
alert("Use valid Gmail.");
return;
}

if(password.length<6){
alert("Password must be at least 6 characters.");
return;
}

try{
const user=await createUserWithEmailAndPassword(auth,email,password);
await sendEmailVerification(user.user);
alert("Verification link sent to your Gmail.");
}catch(error){
alert(error.message);
}
};

window.login = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
alert("Logged in!");
}catch(error){
alert(error.message);
}
};

function renderCart(){

const container=document.getElementById("cartContainer");
const cart=JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.length===0){
container.innerHTML="<p>Your cart is empty.</p>";
return;
}

let html="";
let total=0;

cart.forEach(item=>{
total+=item.unitPrice*item.qty;
html+=`<p>${item.title} x ${item.qty}</p>`;
});

html+=`
<p class="totals">Total: PHP ${total.toFixed(2)}</p>

<h3>Customer Info</h3>

<label>Full Name</label>
<input type="text" id="customerName">

<label>Gmail</label>
<input type="text" id="customerEmail">

<label>Address</label>
<input type="text" id="customerAddress">

<label>PH Number</label>
<input type="text" id="customerContact">

<label>Payment</label>
<select id="paymentMethod">
<option value="">Select</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
</select>

<button id="checkoutBtn" onclick="checkout(${total})" disabled>
Checkout
</button>

<div id="receipt"></div>
`;

container.innerHTML=html;
}

window.checkout=function(total){

if(!auth.currentUser){
alert("Login first.");
return;
}

if(!auth.currentUser.emailVerified){
alert("Verify email first.");
return;
}

const email=document.getElementById("customerEmail").value.trim().toLowerCase();
const contact=document.getElementById("customerContact").value.trim();
const address=document.getElementById("customerAddress").value.trim();

const gmailPattern=/^[a-zA-Z0-9._%+-]+@gmail\.com$/;
const phonePattern=/^09\d{9}$/;
const addressPattern=/^(?=.*[A-Za-z])(?=.*\d).+$/;

if(!gmailPattern.test(email)){
alert("Invalid Gmail.");
return;
}

if(!phonePattern.test(contact)){
alert("Invalid PH number.");
return;
}

if(!addressPattern.test(address)){
alert("Address must contain letters AND numbers.");
return;
}

const orderNumber="FC-"+Date.now();

if(document.getElementById("paymentMethod").value==="GCash"){
window.open("https://www.gcash.com","_blank");
}

document.getElementById("receipt").innerHTML=
"<h3>Order Successful ✔</h3><p>Order #: "+orderNumber+"</p>";

localStorage.removeItem("cart");
};

onAuthStateChanged(auth,(user)=>{
const btn=document.getElementById("checkoutBtn");
if(user && user.emailVerified){
if(btn) btn.disabled=false;
}
});

renderCart();

</script>

</body>
</html>
