<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

section{
padding:60px 40px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ccc;
text-align:left;
}

th{
background:#e2dcd6;
}

button{
background:#6f4e37;
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#573a2e;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

.totals{
text-align:right;
font-weight:bold;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<section>
<h2>Your Cart</h2>
<div id="cartContainer"></div>
</section>

<!-- Firebase (MODULAR CDN VERSION) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBBBLe-4DXODWFrzbs7NJdqBLL9JFCZsfc",
  authDomain: "feynmancoffee.firebaseapp.com",
  projectId: "feynmancoffee",
  storageBucket: "feynmancoffee.firebasestorage.app",
  messagingSenderId: "675690093755",
  appId: "1:675690093755:web:35cd674627b98bd651dd9e",
  measurementId: "G-4JLJ9G30VV"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.firebaseDB = db;
</script>

<script>

function renderCart(){

const container=document.getElementById("cartContainer")
const cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.length===0){
container.innerHTML="<p>Your cart is empty.</p>"
return
}

let html="<table><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>"

let grandTotal=0

cart.forEach(item=>{
const total=item.unitPrice*item.qty
grandTotal+=total

html+=`
<tr>
<td>${item.title}</td>
<td>PHP ${item.unitPrice.toFixed(2)}</td>
<td>${item.qty}</td>
<td>PHP ${total.toFixed(2)}</td>
</tr>
`
})

html+="</table>"

html+=`
<p class="totals">Grand Total: PHP ${grandTotal.toFixed(2)}</p>

<h3>Customer Information</h3>

<label>Full Name</label>
<input type="text" id="customerName">

<label>Email (Gmail Only)</label>
<input type="email" id="customerEmail">

<label>Address</label>
<input type="text" id="customerAddress">

<label>Contact Number</label>
<input type="text" id="customerContact">

<h3>Payment Method</h3>
<select id="paymentMethod">
<option value="">Choose Payment</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button onclick="checkout(${grandTotal})">Checkout</button>

<div id="receipt" style="margin-top:30px;"></div>
`

container.innerHTML=html
}

async function checkout(total){

const cart=JSON.parse(localStorage.getItem("cart")||"[]")
if(cart.length===0){
alert("Cart is empty.")
return
}

const name=document.getElementById("customerName").value.trim()
const email=document.getElementById("customerEmail").value.trim().toLowerCase()
const address=document.getElementById("customerAddress").value.trim()
const contact=document.getElementById("customerContact").value.trim()
const payment=document.getElementById("paymentMethod").value

if(name===""||email===""||address===""||contact===""||payment===""){
alert("Please fill all fields.")
return
}

const orderNumber="FC-"+Date.now()

// Save to Firebase
try{
await addDoc(collection(window.firebaseDB,"orders"),{
orderNumber,
name,
email,
address,
contact,
payment,
total,
cart,
createdAt:new Date()
})
}catch(error){
alert("Error saving order to Firebase.")
return
}

generateReceipt(cart,total,name,email,address,contact,payment,orderNumber)

localStorage.removeItem("cart")
}

function generateReceipt(cart,total,name,email,address,contact,payment,orderNumber){

const receipt=document.getElementById("receipt")

let html=`
<div style="border:1px solid #ccc;padding:20px;background:white;">
<h2>Receipt</h2>

<p><b>Order #:</b> ${orderNumber}</p>
<p><b>Name:</b> ${name}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Address:</b> ${address}</p>
<p><b>Contact:</b> ${contact}</p>
<p><b>Payment:</b> ${payment}</p>

<hr>
`

cart.forEach(item=>{
html+=`<p>${item.title} x ${item.qty}
- PHP ${(item.unitPrice*item.qty).toFixed(2)}</p>`
})

html+=`
<hr>
<h3>Total Paid: PHP ${total.toFixed(2)}</h3>
<p>Thank you for ordering ☕</p>
</div>
`

receipt.innerHTML=html
}

renderCart()

</script>

</body>
</html>
