<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f7f3ef;color:#3b2f2f;}
header{background:#2b1d1d;color:white;padding:20px;display:flex;justify-content:space-between;}
nav a{color:white;margin-left:15px;text-decoration:none;}
section{padding:40px;max-width:900px;margin:auto;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:8px;}
th{background:#e2dcd6;}
button{background:#6f4e37;color:white;border:none;padding:10px;border-radius:4px;cursor:pointer;margin-top:10px;}
input,select{width:100%;padding:8px;margin:6px 0 12px;}
</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<section>
<h2>Your Cart</h2>
<div id="cartContainer"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBBLe-4DXODWFrzbs7NJdqBLL9JFCZsfc",
  authDomain: "feynmancoffee.firebaseapp.com",
  projectId: "feynmancoffee",
  storageBucket: "feynmancoffee.firebasestorage.app",
  messagingSenderId: "675690093755",
  appId: "1:675690093755:web:35cd674627b98bd651dd9e",
  measurementId: "G-4JLJ9G30VV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function renderCart(){

const container=document.getElementById("cartContainer");
const cart=JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.length===0){
container.innerHTML="<p>Your cart is empty.</p>";
return;
}

let html="<table><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>";
let grandTotal=0;

cart.forEach(item=>{
const total=item.unitPrice*item.qty;
grandTotal+=total;

html+=`
<tr>
<td>${item.title}</td>
<td>PHP ${item.unitPrice.toFixed(2)}</td>
<td>${item.qty}</td>
<td>PHP ${total.toFixed(2)}</td>
</tr>`;
});

html+="</table>";

html+=`
<p><b>Grand Total: PHP ${grandTotal.toFixed(2)}</b></p>

<h3>Customer Information</h3>

<input type="text" id="customerName" placeholder="Full Name">
<input type="email" id="customerEmail" placeholder="Gmail Only">
<input type="text" id="customerAddress" placeholder="Address (letters AND numbers)">
<input type="text" id="customerContact" placeholder="09XXXXXXXXX">

<h3>Payment Method</h3>
<select id="paymentMethod">
<option value="">Choose Payment</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button onclick="checkout(${grandTotal})">Checkout</button>

<div id="receipt"></div>
`;

container.innerHTML=html;
}

window.checkout = async function(total){

const name=document.getElementById("customerName").value.trim();
const email=document.getElementById("customerEmail").value.trim().toLowerCase();
const address=document.getElementById("customerAddress").value.trim();
const contact=document.getElementById("customerContact").value.trim();
const payment=document.getElementById("paymentMethod").value;

const gmailPattern=/^[a-zA-Z0-9._%+-]+@gmail\.com$/;
const phonePattern=/^09\d{9}$/;
const addressPattern=/^(?=.*[A-Za-z])(?=.*\d).+$/;

if(!name||!email||!address||!contact||!payment){
alert("Please fill all fields.");
return;
}

if(!gmailPattern.test(email)){
alert("Invalid Gmail.");
return;
}

if(!addressPattern.test(address)){
alert("Address must contain letters AND numbers.");
return;
}

if(!phonePattern.test(contact)){
alert("Invalid PH number.");
return;
}

const cart=JSON.parse(localStorage.getItem("cart")||"[]");
if(cart.length===0){alert("Cart empty.");return;}

const orderNumber="FC-"+Date.now();
const verificationCode=Math.floor(1000+Math.random()*9000);

// Send verification link (OLD SYSTEM)
const userCredential = await createUserWithEmailAndPassword(auth, email, orderNumber+"@temp.com").catch(()=>{});
const user = auth.currentUser;

if(user && !user.emailVerified){
await sendEmailVerification(user);
alert("Verification link sent to your email. Please check and verify.");
return;
}

if(payment==="GCash"){
window.open("https://www.gcash.com","_blank");
}

document.getElementById("receipt").innerHTML=`
<h3>Order Successful 🎉</h3>
<p><b>Order #:</b> ${orderNumber}</p>
<p><b>Total:</b> PHP ${total.toFixed(2)}</p>
`;

localStorage.removeItem("cart");
}

renderCart();

</script>

</body>
</html>
