<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:28px;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

nav a:hover{
color:#6f4e37;
}

section{
padding:60px 40px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px 8px;
border:1px solid #ccc;
text-align:left;
}

th{
background:#e2dcd6;
}

.actions button,.clearBtn{
background:#6f4e37;
color:#fff;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

.actions button:hover,.clearBtn:hover{
background:#573a2e;
}

.empty{
text-align:center;
margin-top:80px;
font-size:1.2em;
}

.totals{
text-align:right;
margin-top:20px;
font-weight:700;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="images/Media-removebg-preview.png" width="40">
<h1>Feynman Coffee</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
<a href="index.html#contact">Contact</a>
</nav>
</header>

<section>
<h2>Your Cart</h2>
<div id="cartContainer"></div>
</section>

<script>

function renderCart(){

const container=document.getElementById("cartContainer")
const cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.length===0){
container.innerHTML="<p class='empty'>Your cart is empty.</p>"
return
}

let html="<table><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr>"

let grandTotal=0

cart.forEach((item,index)=>{

const total=item.unitPrice*item.qty
grandTotal+=total

html+=`
<tr>
<td>${item.title}</td>
<td>PHP ${item.unitPrice.toFixed(2)}</td>
<td>${item.qty}</td>
<td>PHP ${total.toFixed(2)}</td>
<td><button onclick="removeItem(${index})">Remove</button></td>
</tr>
`

})

html+="</table>"

html+=`

<p class="totals">Grand Total: PHP ${grandTotal.toFixed(2)}</p>

<h3>Customer Information</h3>

<label>Full Name</label>
<input type="text" id="customerName">

<label>Address</label>
<input type="text" id="customerAddress">

<label>Contact Number</label>
<input type="text" id="customerContact">

<h3>Payment Method</h3>

<select id="paymentMethod">
<option value="">Choose Payment</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button class="clearBtn" onclick="checkout(${grandTotal})">Checkout</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>

<div id="receipt" style="margin-top:30px;"></div>

`

container.innerHTML=html

}

function removeItem(i){

const cart=JSON.parse(localStorage.getItem("cart")||"[]")
cart.splice(i,1)
localStorage.setItem("cart",JSON.stringify(cart))
renderCart()

}

function clearCart(){

localStorage.removeItem("cart")
renderCart()

}

function checkout(total){

const cart=JSON.parse(localStorage.getItem("cart")||"[]")

const name=document.getElementById("customerName").value
const address=document.getElementById("customerAddress").value
const contact=document.getElementById("customerContact").value
const payment=document.getElementById("paymentMethod").value

if(name==""||address==""||contact==""){
alert("Please fill in your information")
return
}

const phonePattern=/^09\d{9}$/
if(!phonePattern.test(contact)){
alert("Enter valid PH phone number (09123456789)")
return
}

if(payment==""){
alert("Select payment method")
return
}

const orderNumber="FC-"+Date.now()
const verificationCode=Math.floor(1000+Math.random()*9000)

const confirmOrder=confirm(
"Confirm order?\n\n"+
"Order #: "+orderNumber+"\n"+
"Name: "+name+"\n"+
"Address: "+address+"\n"+
"Contact: "+contact+"\n"+
"Payment: "+payment
)

if(!confirmOrder){
return
}

generateReceipt(cart,total,name,address,contact,payment,orderNumber,verificationCode)

localStorage.removeItem("cart")

}

function generateReceipt(cart,total,name,address,contact,payment,orderNumber,verificationCode){

const receipt=document.getElementById("receipt")

let html=`
<div style="border:1px solid #ccc;padding:20px;background:white;">
<h2>Receipt</h2>

<p><b>Order #:</b> ${orderNumber}</p>
<p><b>Verification Code:</b> ${verificationCode}</p>

<p><b>Name:</b> ${name}</p>
<p><b>Address:</b> ${address}</p>
<p><b>Contact:</b> ${contact}</p>
<p><b>Payment:</b> ${payment}</p>

<hr>
`

cart.forEach(item=>{
html+=`
<p>${item.title} x ${item.qty}
- PHP ${(item.unitPrice*item.qty).toFixed(2)}</p>
`
})

html+=`
<hr>
<h3>Total Paid: PHP ${total.toFixed(2)}</h3>
<p>Thank you for ordering from Feynman Coffee! ☕</p>
</div>
`

receipt.innerHTML=html

}

renderCart()

</script>

</body>
</html>
