<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:28px;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

section{
padding:60px 40px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px 8px;
border:1px solid #ccc;
text-align:left;
}

th{
background:#e2dcd6;
}

button{
background:#6f4e37;
color:#fff;
border:none;
padding:8px 12px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#573a2e;
}

.empty{
text-align:center;
margin-top:60px;
font-size:18px;
}

input,select{
width:100%;
padding:8px;
margin:6px 0 12px 0;
}
</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<section>
<h2>Your Cart</h2>
<div id="cartContainer"></div>
</section>

<script>

function renderCart(){

const container=document.getElementById("cartContainer");
const cart=JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.length===0){
container.innerHTML="<p class='empty'>Your cart is empty.</p>";
return;
}

let total=0;
let html="<table><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr>";

cart.forEach((item,index)=>{
let itemTotal=item.unitPrice*item.qty;
total+=itemTotal;

html+=`
<tr>
<td>${item.title}</td>
<td>PHP ${item.unitPrice.toFixed(2)}</td>
<td>${item.qty}</td>
<td>PHP ${itemTotal.toFixed(2)}</td>
<td><button onclick="removeItem(${index})">Remove</button></td>
</tr>
`;
});

html+="</table>";

html+=`
<h3>Grand Total: PHP ${total.toFixed(2)}</h3>

<h3>Customer Information</h3>

<label>Full Name</label>
<input type="text" id="customerName">

<label>Address</label>
<input type="text" id="customerAddress">

<label>Contact Number</label>
<input type="text" id="customerContact">

<label>Payment Method</label>
<select id="paymentMethod">
<option value="">Choose Payment</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button onclick="checkout(${total})">Checkout</button>
<button onclick="clearCart()">Clear Cart</button>

<div id="receipt"></div>
`;

container.innerHTML=html;
}

function removeItem(index){
let cart=JSON.parse(localStorage.getItem("cart")||"[]");
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function clearCart(){
localStorage.removeItem("cart");
renderCart();
}

function checkout(total){

const cart=JSON.parse(localStorage.getItem("cart")||"[]");

const name=document.getElementById("customerName").value.trim();
const address=document.getElementById("customerAddress").value.trim();
const contact=document.getElementById("customerContact").value.trim();
const payment=document.getElementById("paymentMethod").value;

if(name==""||address==""||contact==""){
alert("Please fill in all fields.");
return;
}

if(payment==""){
alert("Please select payment method.");
return;
}

const orderNumber="FC-"+Date.now();

document.getElementById("receipt").innerHTML=`
<h3>Order Successful 🎉</h3>
<p><b>Order #:</b> ${orderNumber}</p>
<p><b>Total Paid:</b> PHP ${total.toFixed(2)}</p>
<p>Thank you for ordering from Feynman Coffee!</p>
`;

localStorage.removeItem("cart");
}

renderCart();

</script>

</body>
</html>
