<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

section{
padding:60px 40px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ccc;
text-align:left;
}

th{background:#e2dcd6;}

button{
background:#6f4e37;
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

button:hover{background:#573a2e;}

input{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

.totals{
text-align:right;
font-weight:bold;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<section>

<h2>Account</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<hr>

<h2>Your Cart</h2>
<div id="cartContainer"></div>

</section>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendEmailVerification,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBBBLe-4DXODWFrzbs7NJdqBLL9JFCZsfc",
  authDomain: "feynmancoffee.firebaseapp.com",
  projectId: "feynmancoffee",
  storageBucket: "feynmancoffee.firebasestorage.app",
  messagingSenderId: "675690093755",
  appId: "1:675690093755:web:35cd674627b98bd651dd9e",
  measurementId: "G-4JLJ9G30VV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.firebaseDB = db;


/* SIGN UP */
window.signup = async function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{
const userCredential = await createUserWithEmailAndPassword(auth,email,password);
await sendEmailVerification(userCredential.user);
alert("Verification email sent! Check your inbox.");
}catch(error){
alert(error.message);
}
}

/* LOGIN */
window.login = async function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
alert("Logged in!");
}catch(error){
alert(error.message);
}
}


/* SHOW AUTH STATUS */
onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("status").innerText =
"Logged in as: "+user.email+
(user.emailVerified ? " (Verified)" : " (Not Verified)");
}
});


/* CART */
function renderCart(){

const container=document.getElementById("cartContainer")
const cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.length===0){
container.innerHTML="<p>Your cart is empty.</p>"
return
}

let html="<table><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>"
let grandTotal=0

cart.forEach(item=>{
const total=item.unitPrice*item.qty
grandTotal+=total

html+=`
<tr>
<td>${item.title}</td>
<td>PHP ${item.unitPrice.toFixed(2)}</td>
<td>${item.qty}</td>
<td>PHP ${total.toFixed(2)}</td>
</tr>`
})

html+="</table>"

html+=`
<p class="totals">Grand Total: PHP ${grandTotal.toFixed(2)}</p>
<button onclick="checkout(${grandTotal})">Checkout</button>
`

container.innerHTML=html
}


window.checkout = async function(total){

const user = auth.currentUser;

if(!user){
alert("Please login first.");
return;
}

if(!user.emailVerified){
alert("Please verify your email before ordering.");
return;
}

const cart=JSON.parse(localStorage.getItem("cart")||"[]")
if(cart.length===0){
alert("Cart empty.");
return;
}

const orderNumber="FC-"+Date.now();

await addDoc(collection(db,"orders"),{
orderNumber,
email:user.email,
total,
cart,
createdAt:new Date()
});

alert("Order successful!");

localStorage.removeItem("cart");
location.reload();
}

renderCart();

</script>

</body>
</html>
