<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feynman Coffee</title>
</head>

<body>

<h2>Sign Up</h2>
<input type="email" id="signupEmail" placeholder="Gmail only">
<input type="password" id="signupPassword" placeholder="Password">
<button onclick="signup()">Sign Up</button>

<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Checkout</h2>

<div id="checkoutSection">

<label>Full Name</label>
<input type="text" id="customerName">

<label>Address (must contain letters AND numbers)</label>
<input type="text" id="customerAddress">

<label>PH Phone Number (09XXXXXXXXX)</label>
<input type="text" id="customerPhone">

<label>Payment Method</label>
<select id="paymentMethod">
<option value="">Select Payment</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button onclick="checkout()">Place Order</button>

</div>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendEmailVerification,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBBBLe-4DXODWFrzbs7NJdqBLL9JFCZsfc",
  authDomain: "feynmancoffee.firebaseapp.com",
  projectId: "feynmancoffee",
  storageBucket: "feynmancoffee.firebasestorage.app",
  messagingSenderId: "675690093755",
  appId: "1:675690093755:web:35cd674627b98bd651dd9e",
  measurementId: "G-4JLJ9G30VV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

/* ================= SIGN UP ================= */

window.signup = async function() {

const email = document.getElementById("signupEmail").value.trim().toLowerCase();
const password = document.getElementById("signupPassword").value;

const gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if(!gmailPattern.test(email)){
alert("Use a valid Gmail address.");
return;
}

try {
const userCredential = await createUserWithEmailAndPassword(auth, email, password);
await sendEmailVerification(userCredential.user);

alert("Verification link sent! Check your email.");
} catch(error){
alert(error.message);
}

};

/* ================= LOGIN ================= */

window.login = async function() {

const email = document.getElementById("loginEmail").value;
const password = document.getElementById("loginPassword").value;

try {
await signInWithEmailAndPassword(auth, email, password);
alert("Logged in!");
} catch(error){
alert(error.message);
}

};

/* ================= CHECK AUTH ================= */

onAuthStateChanged(auth, (user) => {

if(user){
currentUser = user;

if(user.emailVerified){
document.getElementById("status").innerText = "Email Verified ✔ You can checkout.";
} else {
document.getElementById("status").innerText = "Please verify your email first.";
}
} else {
currentUser = null;
}

});

/* ================= CHECKOUT ================= */

window.checkout = function(){

if(!currentUser){
alert("You must login first.");
return;
}

if(!currentUser.emailVerified){
alert("Please verify your email before ordering.");
return;
}

const name = document.getElementById("customerName").value.trim();
const address = document.getElementById("customerAddress").value.trim();
const phone = document.getElementById("customerPhone").value.trim();
const payment = document.getElementById("paymentMethod").value;

const namePattern = /^[A-Za-z\s]+$/;
const addressPattern = /^(?=.*[A-Za-z])(?=.*\d).+$/;
const phonePattern = /^09\d{9}$/;

if(!namePattern.test(name)){
alert("Invalid name.");
return;
}

if(!addressPattern.test(address)){
alert("Address must contain letters AND numbers.");
return;
}

if(!phonePattern.test(phone)){
alert("Invalid PH number.");
return;
}

if(payment === ""){
alert("Select a payment method.");
return;
}

const orderNumber = "FC-" + Date.now();

alert("Order Placed!\nOrder #: " + orderNumber);

if(payment === "GCash"){
window.open("https://www.gcash.com", "_blank");
}

};

</script>

</body>
</html>
