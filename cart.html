<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:28px;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

nav a:hover{
color:#6f4e37;
}

section{
padding:60px 40px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ccc;
text-align:left;
}

th{
background:#e2dcd6;
}

button{
background:#6f4e37;
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#573a2e;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

.empty{
text-align:center;
margin-top:80px;
font-size:1.2em;
}

.totals{
text-align:right;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<section>
<h2>Your Cart</h2>
<div id="cartContainer"></div>
</section>

<script>

function renderCart(){

const container=document.getElementById("cartContainer")
const cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.length===0){
container.innerHTML="<p class='empty'>Your cart is empty.</p>"
return
}

let html="<table><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr>"

let grandTotal=0

cart.forEach((item,index)=>{
const total=item.unitPrice*item.qty
grandTotal+=total

html+=`
<tr>
<td>${item.title}</td>
<td>PHP ${item.unitPrice.toFixed(2)}</td>
<td>${item.qty}</td>
<td>PHP ${total.toFixed(2)}</td>
<td><button onclick="removeItem(${index})">Remove</button></td>
</tr>
`
})

html+="</table>"

html+=`
<p class="totals">Grand Total: PHP ${grandTotal.toFixed(2)}</p>

<h3>Customer Information</h3>

<label>Full Name</label>
<input type="text" id="customerName">

<label>Email (Gmail Only)</label>
<input type="email" id="customerEmail">

<label>Address</label>
<input type="text" id="customerAddress">

<label>Contact Number</label>
<input type="text" id="customerContact">

<h3>Payment Method</h3>
<select id="paymentMethod">
<option value="">Choose Payment</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button onclick="checkout(${grandTotal})">Checkout</button>

<div id="receipt" style="margin-top:30px;"></div>
`

container.innerHTML=html
}

function removeItem(index){
const cart=JSON.parse(localStorage.getItem("cart")||"[]")
cart.splice(index,1)
localStorage.setItem("cart",JSON.stringify(cart))
renderCart()
}

function checkout(total){

const cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.length===0){
alert("Your cart is empty.")
return
}

const name=document.getElementById("customerName").value.trim()
const email=document.getElementById("customerEmail").value.trim().toLowerCase()
const address=document.getElementById("customerAddress").value.trim()
const contact=document.getElementById("customerContact").value.trim()
const payment=document.getElementById("paymentMethod").value

// VALIDATION PATTERNS
const namePattern=/^[A-Za-z\s]+$/
const emailPattern=/^[a-zA-Z0-9]+([._]?[a-zA-Z0-9]+)*@gmail\.com$/
const phonePattern=/^09\d{9}$/

if(name==""||email==""||address==""||contact==""){
alert("Please fill in all fields.")
return
}

if(!namePattern.test(name)){
alert("Invalid name. Letters and spaces only.")
return
}

if(!emailPattern.test(email)){
alert("Please enter a valid Gmail address (example@gmail.com).")
return
}

if(address.length<5){
alert("Please enter a proper address.")
return
}

if(!phonePattern.test(contact)){
alert("Phone number must be valid PH format (09123456789).")
return
}

if(payment==""){
alert("Please select a payment method.")
return
}

// ORDER DETAILS
const orderNumber="FC-"+Date.now()
const verificationCode=Math.floor(1000+Math.random()*9000)

const confirmOrder=confirm(
"Confirm Order?\n\n"+
"Order #: "+orderNumber+"\n"+
"Name: "+name+"\n"+
"Email: "+email+"\n"+
"Total: PHP "+total.toFixed(2)
)

if(!confirmOrder) return

generateReceipt(cart,total,name,email,address,contact,payment,orderNumber,verificationCode)

localStorage.removeItem("cart")

}

function generateReceipt(cart,total,name,email,address,contact,payment,orderNumber,verificationCode){

const receipt=document.getElementById("receipt")

let html=`
<div style="border:1px solid #ccc;padding:20px;background:white;">
<h2>Receipt</h2>

<p><b>Order #:</b> ${orderNumber}</p>
<p><b>Verification Code:</b> ${verificationCode}</p>

<p><b>Name:</b> ${name}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Address:</b> ${address}</p>
<p><b>Contact:</b> ${contact}</p>
<p><b>Payment:</b> ${payment}</p>

<hr>
`

cart.forEach(item=>{
html+=`
<p>${item.title} x ${item.qty}
- PHP ${(item.unitPrice*item.qty).toFixed(2)}</p>
`
})

html+=`
<hr>
<h3>Total Paid: PHP ${total.toFixed(2)}</h3>
<p>Thank you for ordering from Feynman Coffee ☕</p>
</div>
`

receipt.innerHTML=html
}

renderCart()

</script>

</body>
</html>
