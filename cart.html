<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feynman Coffee - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:#f7f3ef;
color:#3b2f2f;
}

header{
background:#2b1d1d;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

section{
padding:60px 40px;
max-width:1000px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#e2dcd6;
}

button{
background:#6f4e37;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:4px;
margin-top:10px;
}

button:hover{
background:#573a2e;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:12px;
}

.empty{
text-align:center;
margin-top:50px;
}
</style>
</head>

<body>

<header>
<h1>Feynman Coffee</h1>
</header>

<section>

<h2>Your Cart</h2>
<div id="cartContainer"></div>

</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG (replace if needed)
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS",
  storageBucket: "PASTE_YOURS",
  messagingSenderId: "PASTE_YOURS",
  appId: "PASTE_YOURS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function renderCart(){

const container=document.getElementById("cartContainer");
const cart=JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.length===0){
container.innerHTML="<p class='empty'>Your cart is empty.</p>";
return;
}

let total=0;
let html="<table><tr><th>Item</th><th>Qty</th><th>Total</th></tr>";

cart.forEach(item=>{
let itemTotal=item.unitPrice*item.qty;
total+=itemTotal;
html+=`<tr>
<td>${item.title}</td>
<td>${item.qty}</td>
<td>PHP ${itemTotal.toFixed(2)}</td>
</tr>`;
});

html+="</table>";

html+=`
<h3>Total: PHP ${total.toFixed(2)}</h3>

<h3>Customer Info</h3>

<label>Full Name</label>
<input type="text" id="name">

<label>Gmail</label>
<input type="email" id="email">

<label>Address</label>
<input type="text" id="address">

<label>Phone (09XXXXXXXXX)</label>
<input type="text" id="phone">

<label>Payment</label>
<select id="payment">
<option value="">Select</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Credit Card">Credit Card</option>
</select>

<button onclick="checkout(${total})">Checkout</button>

<div id="receipt"></div>
`;

container.innerHTML=html;
}

function checkout(total){

const cart=JSON.parse(localStorage.getItem("cart")||"[]");

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const address=document.getElementById("address").value.trim();
const phone=document.getElementById("phone").value.trim();
const payment=document.getElementById("payment").value;

const namePattern=/^[A-Za-z\s]+$/;
const emailPattern=/^[a-zA-Z0-9._%+-]+@gmail\.com$/;
const phonePattern=/^09\d{9}$/;
const addressPattern=/^(?=.*[A-Za-z])(?=.*\d).+/;

if(!namePattern.test(name)){
alert("Invalid name.");
return;
}

if(!emailPattern.test(email)){
alert("Enter valid Gmail.");
return;
}

if(!addressPattern.test(address)){
alert("Address must contain letters and numbers.");
return;
}

if(!phonePattern.test(phone)){
alert("Invalid PH number.");
return;
}

if(payment===""){
alert("Select payment method.");
return;
}

const orderNumber="FC-"+Date.now();

db.collection("orders").add({
orderNumber,
name,
email,
address,
phone,
payment,
total,
items:cart,
date:new Date()
});

document.getElementById("receipt").innerHTML=`
<h3>Order Successful 🎉</h3>
<p>Order #: ${orderNumber}</p>
<p>Total Paid: PHP ${total.toFixed(2)}</p>
`;

localStorage.removeItem("cart");
}

renderCart();
</script>

</body>
</html>
