<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email">
<input type="password" id="password">
<button onclick="login()">Login</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBBBLe-4DXODWFrzbs7NJdqBLL9JFCZsfc",
authDomain: "feynmancoffee.firebaseapp.com",
projectId: "feynmancoffee",
storageBucket: "feynmancoffee.firebasestorage.app",
messagingSenderId: "675690093755",
appId: "1:675690093755:web:35cd674627b98bd651dd9e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth, email, password);

if(auth.currentUser.emailVerified){
window.location.href="cart.html";
}else{
alert("Please verify your email first.");
}

}catch(error){
alert(error.message);
}

};

</script>

</body>
</html>
